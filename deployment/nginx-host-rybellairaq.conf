# Nginx على السيرفر (HOST) — ليس داخل Docker
# يربط rybellairaq.com بمتجر الويب على المنفذ 4003
#
# التثبيت:
#   sudo cp deployment/nginx-host-rybellairaq.conf /etc/nginx/sites-available/rybellairaq.com
#   sudo ln -sf /etc/nginx/sites-available/rybellairaq.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d rybellairaq.com -d www.rybellairaq.com

# HTTP — Certbot يضيف redirect إلى HTTPS تلقائياً بعد التفعيل
server {
    listen 80;
    listen [::]:80;
    server_name rybellairaq.com www.rybellairaq.com;

    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:4003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

