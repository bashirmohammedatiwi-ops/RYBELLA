# Rybella — داخل delivery-nginx
# مسار مقترح على السيرفر: /opt/delivery-system/nginx/conf.d/rybellairaq.com.conf
#
# أسرع: ربط delivery-nginx بشبكة Rybella:
#   docker network connect rybella_rybella-network delivery-nginx
#   ثم غيّر upstream إلى: server rybella-webstore:80;

upstream rybella_webstore {
    server 172.17.0.1:4003;
    keepalive 32;
}

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name rybellairaq.com www.rybellairaq.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — متجر Rybella
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name rybellairaq.com www.rybellairaq.com;

    ssl_certificate     /etc/letsencrypt/live/rybellairaq.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rybellairaq.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:rybellaSSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 100M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        image/svg+xml;

    location / {
        proxy_pass http://rybella_webstore;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering on;
        proxy_buffers 16 32k;
        proxy_busy_buffers_size 64k;
    }
}
