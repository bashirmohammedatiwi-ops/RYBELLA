# Rybella Iraq - Production Docker Compose
# شغّل دائماً من جذر المشروع:
#   ./deploy.sh
# أو:
#   docker compose --env-file deployment/.env up -d --build

services:
  backend:
    build:
      context: .
      dockerfile: deployment/backend.Dockerfile
    container_name: rybella-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DB_PATH=/app/data/rybella.db
      - BACKUP_PATH=/app/backups
      - UPLOAD_PATH=/app/uploads
      - JWT_SECRET=${JWT_SECRET:-RybellaChangeThisSecretInEnv}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - API_URL=${API_URL:-http://localhost:4000}
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-5242880}
      - EXTERNAL_INVENTORY_API_URL=${EXTERNAL_INVENTORY_API_URL:-}
      - EXTERNAL_INVENTORY_API_EMAIL=${EXTERNAL_INVENTORY_API_EMAIL:-}
      - EXTERNAL_INVENTORY_API_PASSWORD=${EXTERNAL_INVENTORY_API_PASSWORD:-}
      - EXTERNAL_INVENTORY_API_TOKEN=${EXTERNAL_INVENTORY_API_TOKEN:-}
      - INVENTORY_SYNC_INTERVAL_MIN=${INVENTORY_SYNC_INTERVAL_MIN:-5}
    volumes:
      - backend_data:/app/data
      - backend_uploads:/app/uploads
      - backend_backups:/app/backups
    networks:
      - rybella-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    build:
      context: .
      dockerfile: deployment/admin.Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: rybella-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:${HTTP_PORT:-4000}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - rybella-network

  webstore:
    build:
      context: .
      dockerfile: deployment/storefront-premium.Dockerfile
      args:
        - VITE_API_URL=
    container_name: rybella-webstore
    restart: unless-stopped
    ports:
      - "127.0.0.1:${WEBSTORE_PORT:-4003}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - rybella-network

volumes:
  backend_data:
    name: rybella_backend_data
  backend_uploads:
    name: rybella_backend_uploads
  backend_backups:
    name: rybella_backend_backups

networks:
  rybella-network:
    driver: bridge
