name: Build Admin Desktop (Windows)

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'admin-dashboard/**'
      - '.github/workflows/build-admin-desktop-win.yml'

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: admin-dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin-dashboard/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: admin-dashboard/src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Windows installer (.exe)
        run: npm run desktop:build:win
        env:
          CI: true

      - name: Upload .exe installer
        uses: actions/upload-artifact@v4
        with:
          name: Rybella-Admin-Windows
          path: |
            admin-dashboard/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            admin-dashboard/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          if-no-files-found: error
